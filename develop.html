<style>

 *{box-sizing:border-box}
 body{font:15px/1.55 -apple-system,Segoe UI,Roboto,Arial;margin:0;background:var(--bg);color:var(--ink)}
 .wrap{max-width:1180px;margin:0 auto;padding:18px 16px 60px}
 header{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 16px;margin-bottom:2px}
 h1{font-size:21px;margin:0}
 .tabs{display:flex;gap:8px;margin:6px 0 2px}
 .tabs a{font-size:14px;text-decoration:none;padding:7px 14px;border-radius:20px;
   border:1px solid var(--line);background:#eef1f5;color:#374151}
 .tabs a.on{background:var(--blue);color:#fff;border-color:var(--blue)}
 .status{color:var(--mut);font-size:12px;width:100%}
 .bar{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;margin:14px 0 6px;
   padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px}
 .bar label{font-size:12px;color:var(--mut);margin-right:5px}
 select,input{font:14px inherit;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff}
 input[type=number]{width:96px}
 .count{color:var(--mut);font-size:13px;margin:10px 2px}
 .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
 .card{background:var(--card);border:1px solid var(--line);border-left-width:5px;border-radius:13px;
   padding:14px 16px;display:flex;flex-direction:column;gap:9px}
 .card.good{border-left-color:var(--green)}
 .card.ok{border-left-color:var(--amber)}
 .card.poor{border-left-color:var(--red)}
 .addr{font-size:17px;font-weight:650;line-height:1.3}
 .addr a{color:var(--ink);text-decoration:none}.addr a:hover{text-decoration:underline}
 .price{font-size:20px;font-weight:700}
 .facts{color:var(--mut);font-size:13px;font-weight:400}
 .under{font-size:13.5px;color:#374151}
 .under b{color:var(--green)}
 .head{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
 .metric{font-size:26px;font-weight:750;line-height:1.1}
 .metric .u{font-size:14px;font-weight:600;color:var(--mut)}
 .sub{color:var(--mut);font-size:13px}
 .verdict{font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
 .verdict.good{background:#dcfce7;color:var(--green)}
 .verdict.ok{background:#fef9c3;color:var(--amber)}
 .verdict.poor{background:#fee2e2;color:var(--red)}
 .play{font-size:12.5px;color:#374151;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:7px 9px}
 .chips{display:flex;flex-wrap:wrap;gap:6px}
 .chip{font-size:11.5px;padding:3px 8px;border-radius:20px;background:#eef1f5;color:#374151;border:1px solid var(--line)}
 .chip.flag{background:#fef2f2;color:var(--red);border-color:#fecaca}
 .chip.hyp{background:#fffbeb;color:var(--amber);border-color:#fde68a}
 .stale{background:#fef2f2;border:1px solid #fecaca;color:var(--red);padding:8px 12px;border-radius:10px;font-size:13px;margin-top:8px}
 .seg button{font:14px inherit;background:#eef1f5;color:#374151;border:1px solid var(--line);
   border-radius:18px;padding:7px 14px;margin-right:7px;cursor:pointer}
 .seg button.on{background:var(--blue);color:#fff;border-color:var(--blue)}
 @media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>

  if(cond==='refurbished'||cond==='good') return {tier:3,cls:'poor',verdict:'already done up'};
  if(cond==='tbc'||!cond) return {tier:2,cls:'ok',verdict:'condition tbc'};
  if(margin==null || margin<10) return {tier:2,cls:'poor',verdict:`only ~${margin??'?'}% — too thin`};
  if(d.structural) return {tier:1,cls:'ok',verdict:'verify why cheap'};
  return {tier:0,cls:'good',verdict:`do-it-up ~${margin}%`};
}

function card(c){
  const r = c.scores.rental||{}, d = c.scores.development||{};
  const fit = MODE==='rental' ? rentalFit(c) : devFit(c);
  const under = d.under_vs_street_pct;
  const chips=[];
  if(c.condition) chips.push(`<span class=chip>${c.condition}</span>`);
  if(c.band) chips.push(`<span class=chip>${c.band}</span>`);
  if(c.building_class) chips.push(`<span class=chip>${c.building_class}</span>`);
  (c.flags||[]).forEach(f=>chips.push(`<span class="chip flag">${f.code||f}</span>`));
  (c.hypotheses||[]).forEach(h=>chips.push(`<span class="chip hyp">${(h.code||h)} ?</span>`));

  let metric, sub, extra='';
  if(MODE==='rental'){
    metric = `${r.net_yield_est??'?'}<span class=u>% net</span>`;
    sub = `${r.gross_yield!=null?r.gross_yield+'% gross':''}${r.rent_pcm_est?' &middot; ~'+money(r.rent_pcm_est)+'pcm':''}`;
  } else {
    metric = `${d.do_it_up_net_pct!=null?d.do_it_up_net_pct:'—'}<span class=u>% after costs</span>`;
    sub = under!=null?`${under}% under street${d.under_vs_kf_pct!=null?' &middot; '+d.under_vs_kf_pct+'% under KF':''}`:'';
    if(d.play) extra = `<div class=play>${d.play}</div>`;
  }
  return `<div class="card ${fit.cls}">
    <div class=addr><a href="${c.url}" target=_blank rel=noopener>${c.address}</a></div>
    <div class=price>${money(c.price)} <span class=facts>&middot; ${c.beds} bed &middot; ${c.usable_sqft||'?'} sqft</span></div>
    <div class=head><div class=metric>${metric}</div><span class="verdict ${fit.cls}">${fit.verdict}</span></div>
    ${sub?`<div class=sub>${sub}</div>`:''}
    ${MODE==='rental'&&under!=null?`<div class=under><b>${under}% under its street</b> &mdash; £${c.asking_ppsf} vs £${c.expected_ppsf}/sqft</div>`:''}
    ${extra}
    <div class=chips>${chips.join('')}</div>
  </div>`;
}

function render(){
  const a = DATA[curArea];
  $('#status').textContent = `${a.area_label} — updated ${(a.generated_at||a.run_id||'').slice(0,10)}`;
  $('#stale').innerHTML = a.stale ? `<div class=stale>⚠ Data may be stale — last good run shown.</div>` : '';
  const lo = +$('#pmin').value||0, hi = +$('#pmax').value||1e12;
  let cs = a.candidates.filter(c=>c.price>=lo && c.price<=hi);
  // the dev page is only about do-it-up flats — refurbished/good have no refurb play
  if(MODE==='develop') cs = cs.filter(c=>['tired','needs-work'].includes(c.condition));
  const fitOf = MODE==='rental'?rentalFit:devFit;
  const keyOf = MODE==='rental'
    ? c=>(c.scores.rental?.net_yield_est ?? c.scores.rental?.gross_yield ?? 0)
    : c=>(c.scores.development?.do_it_up_net_pct ?? -1);
  // suitable first (tier), then by the strategy metric desc - keeps unsuitable OFF the top
  cs.sort((x,y)=> fitOf(x).tier-fitOf(y).tier || keyOf(y)-keyOf(x));
  const label = MODE==='rental'?'net yield (lettable first)':'margin after all costs (clean plays first)';
  $('#count').textContent = `${cs.length} flats — ranked by ${label}`;
  $('#grid').innerHTML = cs.map(card).join('');
}

const ab = $('#areas');
DATA.forEach((a,i)=>{const b=document.createElement('button');b.textContent=a.area_label;
  b.onclick=()=>{curArea=i;syncAreas();render();};ab.appendChild(b);});
function syncAreas(){[...ab.children].forEach((b,i)=>b.classList.toggle('on',i===curArea));}
syncAreas();
$('#pmin').oninput=$('#pmax').oninput=render;
$('#'+(MODE==='rental'?'tRent':'tDev')).classList.add('on');
render();
</script>
